name: Publish Package

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  check-version:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: | 
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Check version consistency
      run: |
        # Extract version from __init__.py
        INIT_VERSION=$(python -c "from andfn import __version__; print(__version__)")
        
        # Extract version from pyproject.toml
        TOML_VERSION=$(python -c "import tomllib; data = tomllib.load(open('pyproject.toml', 'rb')); print(data['project']['version'] if 'version' in data['project'] else data['tool']['setuptools']['dynamic']['version'].split(\"'\")[1])" 2>/dev/null || python -c "import toml; data = toml.load('pyproject.toml'); print(data.get('project', {}).get('version', ''))")

        # Extract sphinx release
        SH_VERSION=$(python -c "from docs.conf import release; print(release)")
        
        echo "Version in __init__.py: $INIT_VERSION"
        echo "Version in pyproject.toml: $TOML_VERSION"
        echo "Version in conf.py: $SH_VERSION"
        
        
        if [ "$INIT_VERSION" != "$TOML_VERSION" ] || [ "$INIT_VERSION" != "$SH_VERSION" ] || [ "$TOML_VERSION" != "$SH_VERSION" ]; then
            echo "❌ Version mismatch!"
            echo "andfn/__init__.py has version: $INIT_VERSION"
            echo "pyproject.toml has version:     $TOML_VERSION"
            echo "setup.sh has version:           $SH_VERSION"
            exit 1
        else
            echo "✅ All versions match!"
        fi

    
  test-publish:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    permissions:
      id-token: write        # For trusted publishing to TestPyPI
      pull-requests: write   # For commenting on PRs
    
    steps:
    - uses: actions/checkout@v4
      with:
          fetch-depth: 0

    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Debug full pyproject
      run: |
        echo "### FULL pyproject.toml ###"
        nl -ba pyproject.toml


    - name: Install dependencies
      run: | 
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install build
      
    - name: Create dev version for TestPyPI
      run: |
        # Create unique version for PR testing (e.g., 0.1.0.dev42001701234567)
        PR_VERSION=$(python -c "from andfn import __version__; print(__version__)")
        DEV_VERSION="${PR_VERSION}.dev${{ github.event.number }}$(date +%s)"
        sed -i "s/version = ".*"/version = "$DEV_VERSION"/" pyproject.toml
        echo "Created dev version: $DEV_VERSION"
        
    - name: Build package
      run: python -m build
      
    - name: Publish to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
        
    - name: Comment on PR
      uses: actions/github-script@v7
      with:
        script: |
          const version = process.env.DEV_VERSION || 'dev-version';
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `🚀 **TestPyPI Release Published**\n\nYou can test this version with:\n\`
            \
            bash\npip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ andfn==${version}\n\`
          })

  publish-and-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: write  # For creating releases
      id-token: write  # For trusted publishing to PyPI
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install build dependencies  # ADD THIS STEP
      run: |
        python -m pip install --upgrade pip
        pip install build
        pip install -r requirements.txt
      
    - name: Build package
      run: python -m build
      
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
        
    - name: Get version from pyproject.toml
      id: get_version
      run: |
        VERSION=$(python -c "from andfn import __version__; print(__version__)")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.get_version.outputs.version }}
        name: Release v${{ steps.get_version.outputs.version }}
        generate_release_notes: true
        files: |
          dist/*.tar.gz
          dist/*.whl
        body: |
          ## 📦 PyPI Release
          
          This release has been automatically published to PyPI.
          
          **Install with pip:**
          ```bash
          pip install andfn==${{ steps.get_version.outputs.version }}
          ```
          
          **Or upgrade with pip:**
          ```bash
          pip install --upgrade andfn
          ```
    
    - name: Build HTML
      run: | 
        cd docs/
        make html
    
    - name: Run ghp-import
      run: | 
        ghp-import -n -p -f docs/_build/html
