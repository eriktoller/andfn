name: Publish Package

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  check-version:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: | 
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Check version consistency
      run: |
        set -e
    
        PACKAGE_NAME="andfn"
    
        # -----------------------------
        # Extract versions from sources
        # -----------------------------
    
        INIT_VERSION=$(python -c "from andfn import __version__; print(__version__)")
    
        TOML_VERSION=$(python -c "import tomllib; data = tomllib.load(open('pyproject.toml', 'rb')); print(data['project']['version'] if 'version' in data['project'] else data['tool']['setuptools']['dynamic']['version'].split(\"'\")[1])" \
          2>/dev/null || \
          python -c "import toml; data = toml.load('pyproject.toml'); print(data.get('project', {}).get('version', ''))")
    
        SH_VERSION=$(python -c "from docs.conf import release; print(release)")
    
        # -----------------------------
        # Fetch latest published version
        # -----------------------------
    
        PUBLISHED_VERSION=$(python - <<EOF
        import json, urllib.request
        pkg = "$PACKAGE_NAME"
        url = f"https://pypi.org/pypi/{pkg}/json"
        with urllib.request.urlopen(url) as r:
            print(json.load(r)["info"]["version"])
        EOF
            )
        
            echo "Version in __init__.py:        $INIT_VERSION"
            echo "Version in pyproject.toml:    $TOML_VERSION"
            echo "Version in conf.py:           $SH_VERSION"
            echo "Published version on PyPI:    $PUBLISHED_VERSION"
        
            # --------------------------------
            # Internal consistency check
            # --------------------------------
        
            if [ "$INIT_VERSION" != "$TOML_VERSION" ] || \
               [ "$INIT_VERSION" != "$SH_VERSION" ] || \
               [ "$TOML_VERSION" != "$SH_VERSION" ]; then
                echo "❌ Version mismatch between source files!"
                exit 1
            fi
        
            echo "✅ Internal versions match"
        
            # --------------------------------
            # Compare to published PyPI version
            # --------------------------------
        
            python - <<EOF
            from packaging.version import Version
            
            local = Version("$INIT_VERSION")
            published = Version("$PUBLISHED_VERSION")
            
            if local <= published:
                raise SystemExit(
                    f"❌ Local version {local} must be greater than published version {published}"
                )
            
            print(f"✅ Local version {local} is newer than published version {published}")
            EOF
            ``

    
  test-publish:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    permissions:
      id-token: write        # For trusted publishing to TestPyPI
      pull-requests: write   # For commenting on PRs
    
    steps:
    - uses: actions/checkout@v4

    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'


    - name: Install dependencies
      run: | 
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install build


    - name: Create dev version for TestPyPI
      run: |
        # 1. Get the current version from the code
        PR_VERSION=$(python -c "from andfn import __version__; print(__version__)")
        
        # 2. Generate the unique dev version string
        DEV_VERSION="${PR_VERSION}.dev${{ github.event.number }}$(date +%s)"
        
        # 3. Use single quotes for sed to avoid shell expansion issues with internal double quotes
        sed -i 's/version = ".*"/version = "'$DEV_VERSION'"/' pyproject.toml
        
        # 4. (Optional) Export for the next step (the PR comment)
        echo "DEV_VERSION=$DEV_VERSION" >> $GITHUB_ENV
        echo "Created dev version: $DEV_VERSION"
        
    - name: Build package
      run: python -m build
      
    - name: Publish to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
         
    - name: Comment on PR
      uses: actions/github-script@v7
      env:
        FINAL_VERSION: ${{ env.DEV_VERSION }}
      with:
        script: |
          const version = process.env.FINAL_VERSION;
          const body = `🚀 **TestPyPI Release Published**
 
          You can test this version with:
          \`\`\`bash
          pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ andfn==${version}
          \`\`\``;
 
          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: body
          });

  publish-and-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: write  # For creating releases
      id-token: write  # For trusted publishing to PyPI
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install build dependencies  # ADD THIS STEP
      run: |
        python -m pip install --upgrade pip
        pip install build
        pip install -r requirements.txt
      
    - name: Build package
      run: python -m build
      
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
        
    - name: Get version from pyproject.toml
      id: get_version
      run: |
        VERSION=$(python -c "from andfn import __version__; print(__version__)")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.get_version.outputs.version }}
        name: Release v${{ steps.get_version.outputs.version }}
        generate_release_notes: true
        files: |
          dist/*.tar.gz
          dist/*.whl
        body: |
          ## 📦 PyPI Release
          
          This release has been automatically published to PyPI.
          
          **Install with pip:**
          ```bash
          pip install andfn==${{ steps.get_version.outputs.version }}
          ```
          
          **Or upgrade with pip:**
          ```bash
          pip install --upgrade andfn
          ```
    
    - name: Build HTML
      run: | 
        cd docs/
        make html
    
    - name: Run ghp-import
      run: | 
        ghp-import -n -p -f docs/_build/html
